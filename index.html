<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>

    <title>Weather App</title>
  </head>

  <body>
    <div class="weather-app">
      <h1>Weather App</h1>

      <form class="search-form" id="search-form">
        <input type="search" id="search-input" class="search-input" placeholder="Search city..." required />
        <button class="search-button">Search</button>
      </form>

      <main>
        <div class="weather-data">
          <div>
            <div class="city" id="city">—</div>
            <p class="details">
              <span id="time">--</span>, <span id="description">--</span><br />
              Humidity: <strong id="humidity">--</strong>, Wind: <strong id="wind-speed">--</strong>
            </p>
          </div>

          <div class="temperature-container">
            <div id="icon"></div>
            <div class="temperature" id="temperature">--</div>
            <div class="unit">°C</div>
          </div>
        </div>

        <h2>Forecast</h2>
        <div class="forecast" id="forecast"></div>
      </main>

      <footer>
        Coded by <a href="https://github.com/yvonnesarah" target="_blank">Yvonne Adedeji</a> — Open source on <a href="https://github.com/yvonnesarah/weather-app" target="_blank">GitHub</a> - Hosted on
        <a href="https://ya-weather-app.netlify.app/" target="_blank">Netlify</a>.
      </footer>
    </div>

    <script src="assets/js/script.js"></script>
  </body>
</html>
